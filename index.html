<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCJC Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Fullscreen 3D canvas -->
    <div id="canvas-container"></div>

    <!-- SHOOT: fullscreen mirrored webcam + caption + countdown -->
    <div id="screen-shoot" class="screen hidden">
      <video id="webcam-video" autoplay playsinline muted></video>
      <div id="webcam-placeholder" class="hidden">
        <p>カメラを起動中、または未接続です</p>
      </div>
      <div id="shoot-frame" aria-hidden="true">
        <span class="frame-corner tl"></span>
        <span class="frame-corner tr"></span>
        <span class="frame-corner bl"></span>
        <span class="frame-corner br"></span>
        <span class="frame-crosshair"></span>
      </div>
      <div id="shoot-caption"></div>
      <img
        id="shoot-logo"
        src="/coca_cola_logo_white.svg"
        alt="Coca-Cola"
        draggable="false"
      />
      <div id="countdown" class="hidden">3</div>
    </div>

    <!-- RESULT: bare image + top-left logo + brand-colored bottom rectangle -->
    <div id="screen-result" class="screen hidden">
      <img id="result-image" src="" alt="" draggable="false" />
      <img
        id="result-logo"
        src="/blk_next_chapter_of_growth.svg"
        alt="Next Chapter of Growth"
        draggable="false"
      />
      <div id="result-rect"></div>
    </div>

    <!-- White flash / transition overlay -->
    <div id="flash-overlay"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
