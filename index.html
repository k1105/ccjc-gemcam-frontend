<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCJC Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Fullscreen 3D canvas -->
    <div id="canvas-container"></div>

    <!-- 待機画面の上端グラデーション（影）。色/長さ/不透明度は choreo.select.gradient で調整 -->
    <div id="select-gradient" class="hidden" aria-hidden="true"></div>

    <!-- SHOOT: fullscreen mirrored webcam + caption + countdown -->
    <div id="screen-shoot" class="screen hidden">
      <video id="webcam-video" autoplay playsinline muted></video>
      <div id="webcam-placeholder" class="hidden">
        <p>カメラを起動中、または未接続です</p>
      </div>
      <div id="shoot-frame" aria-hidden="true">
        <span class="frame-corner tl"></span>
        <span class="frame-corner tr"></span>
        <span class="frame-corner bl"></span>
        <span class="frame-corner br"></span>
        <span class="frame-crosshair"></span>
      </div>
      <!-- デバッグ専用: 生成API へ送るクロップ領域の可視化（本番では非表示） -->
      <div id="shoot-region" class="hidden" aria-hidden="true">
        <span class="region-label">生成領域</span>
      </div>
      <div id="shoot-caption"></div>
      <img
        id="shoot-logo"
        src="/coca_cola_logo_white.svg"
        alt="Coca-Cola"
        draggable="false"
      />
      <div id="countdown" class="hidden">3</div>
    </div>

    <!-- RESULT: bare image + top-left/right logos + brand-colored bottom rectangle -->
    <div id="screen-result" class="screen hidden">
      <img id="result-image" src="" alt="" draggable="false" />
      <!-- 左上 all_hands / 右上 coca_cola_j_and_k。space-between で両端寄せ、
           余白・各ロゴのオフセットはリザルトのデバッガーから調整する。 -->
      <div id="result-logos">
        <img
          id="result-logo-left"
          class="result-logo"
          src="/all_hands.svg"
          alt=""
          draggable="false"
        />
        <img
          id="result-logo-right"
          class="result-logo"
          src="/blk_next_chapter_of_growth.svg"
          alt=""
          draggable="false"
        />
      </div>
      <div id="result-rect"></div>
    </div>

    <!-- 待機画面の選択演出: ブランドカラーの帯（下→上へ流れて SHOOT へハンドオフ）。
         display:none では切り替えず、常時レイヤー化したまま visibility/transform で出し入れする
         （表示瞬間のレイヤー再生成によるフレーム落ちを避けるため）。 -->
    <div id="select-rect" aria-hidden="true"></div>

    <!-- GENERATE: 生成未完了で pullBack を見せ終えたとき中央に出す待機ロゴ -->
    <img
      id="generate-wait-logo"
      class="hidden"
      src="/blk_coca_cola_j_and_k.svg"
      alt="Coca-Cola"
      draggable="false"
    />

    <!-- White flash / transition overlay -->
    <div id="flash-overlay"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
